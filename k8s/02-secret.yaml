# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Do NOT commit real secret values to git.
# 
# Option A (recommended): Use AWS Secrets Manager + External Secrets Operator
#   https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# Option B: Inject via Opsera pipeline "Step Variables" — set each key as a
#   masked pipeline variable and let Opsera substitute at deploy time.
#
# Option C: Manually apply this file once with real values:
#   kubectl create secret generic p7vc-crm-secrets -n p7vc-crm \
#     --from-literal=DATABASE_URL='postgres://...' \
#     --from-literal=REDIS_URL='redis://...' \
#     --from-literal=AUTH0_DOMAIN='...' \
#     --from-literal=AUTH0_CLIENT_ID='...' \
#     --from-literal=AUTH0_CLIENT_SECRET='...' \
#     --from-literal=AUTH0_APP_BASE_URL='https://app.p7vc-crm.com' \
#     --from-literal=JWT_SECRET='...'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: p7vc-crm-secrets
  namespace: p7vc-crm
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  REDIS_URL: "REPLACE_ME"
  AUTH0_DOMAIN: "REPLACE_ME"
  AUTH0_CLIENT_ID: "REPLACE_ME"
  AUTH0_CLIENT_SECRET: "REPLACE_ME"
  AUTH0_APP_BASE_URL: "https://app.p7vc-crm.com"
  JWT_SECRET: "REPLACE_ME"
