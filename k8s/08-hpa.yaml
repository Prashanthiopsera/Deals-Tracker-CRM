apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: p7vc-crm-api-hpa
  namespace: p7vc-crm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: p7vc-crm-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: p7vc-crm-frontend-hpa
  namespace: p7vc-crm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: p7vc-crm-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
