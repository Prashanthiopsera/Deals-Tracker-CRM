apiVersion: v1
kind: ConfigMap
metadata:
  name: p7vc-crm-config
  namespace: p7vc-crm
data:
  # ── Shared ──────────────────────────────────────────────────────────────
  NODE_ENV: "production"
  # Must match a registered API identifier in the Auth0 tenant (else login
  # fails with "Service not found"). This is the tenant's registered API.
  AUTH0_AUDIENCE: "https://api.p7vc-crm.com"
  AUTH0_HOSTED_DOMAIN: "opsera.io"
  # Public base URL of the frontend. The Auth0 SDK reads APP_BASE_URL and builds
  # the callback as ${APP_BASE_URL}/api/auth/callback — must be an Allowed
  # Callback URL in Auth0. (Defaults to http://localhost:3001 if unset.)
  APP_BASE_URL: "https://p7vc-crm.agent.opsera.dev"

  # ── API (backend container) ─────────────────────────────────────────────
  PORT: "3000"
  OTEL_SDK_DISABLED: "true"

  # ── Frontend container ──────────────────────────────────────────────────
  FRONTEND_PORT: "3001"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"

  # Browser-facing API base (also baked into the frontend image at build time
  # via --build-arg NEXT_PUBLIC_API_URL). Points at the api host on the wildcard.
  NEXT_PUBLIC_API_URL: "https://p7vc-crm-api.agent.opsera.dev"
  # Server-side (SSR) Next.js → API calls. Both containers share the pod's
  # network namespace, so the backend is reachable on localhost:3000.
  INTERNAL_API_URL: "http://localhost:3000"
