apiVersion: v1
kind: ConfigMap
metadata:
  name: p7vc-crm-config
  namespace: p7vc-crm
data:
  # ── Shared ────────────────────────────────────────────────────────────────
  NODE_ENV: "production"
  AUTH0_AUDIENCE: "https://api.p7vc-crm.com"
  AUTH0_HOSTED_DOMAIN: "opsera.io"

  # ── API ───────────────────────────────────────────────────────────────────
  PORT: "3000"
  OTEL_SDK_DISABLED: "true"

  # ── Frontend ──────────────────────────────────────────────────────────────
  FRONTEND_PORT: "3001"
  HOSTNAME: "0.0.0.0"
  NEXT_TELEMETRY_DISABLED: "1"

  # ── Public API URL (baked in at build time via --build-arg, but also
  #    available at runtime for SSR requests inside the cluster) ────────────
  NEXT_PUBLIC_API_URL: "https://api.p7vc-crm.com"
  # Internal cluster service URL for server-side Next.js → API calls
  INTERNAL_API_URL: "http://p7vc-crm-api-svc:3000"
