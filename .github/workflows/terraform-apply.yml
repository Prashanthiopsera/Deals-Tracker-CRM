name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod]

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform init
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN -e AWS_REGION \
            -v "${{ github.workspace }}/infra/terraform:/tf" \
            -w /tf/environments/${{ inputs.environment }} \
            hashicorp/terraform:1.5 init -input=false

      - name: Terraform apply
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN -e AWS_REGION \
            -v "${{ github.workspace }}/infra/terraform:/tf" \
            -w /tf/environments/${{ inputs.environment }} \
            hashicorp/terraform:1.5 apply -auto-approve -input=false

      - name: Record deployment commit
        run: echo "Applied commit ${{ github.sha }} to ${{ inputs.environment }}"
