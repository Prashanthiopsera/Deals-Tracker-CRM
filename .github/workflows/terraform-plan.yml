name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/terraform-plan.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [dev, staging, prod]
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Terraform fmt check
        run: |
          docker run --rm -v "${{ github.workspace }}/infra/terraform:/tf" hashicorp/terraform:1.5 \
            fmt -check -recursive /tf

      - name: Terraform init
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN -e AWS_REGION \
            -v "${{ github.workspace }}/infra/terraform:/tf" \
            -w /tf/environments/${{ matrix.environment }} \
            hashicorp/terraform:1.5 init -backend=false

      - name: Terraform validate
        run: |
          docker run --rm -v "${{ github.workspace }}/infra/terraform:/tf" -w /tf/environments/${{ matrix.environment }} hashicorp/terraform:1.5 \
            validate

      - name: Terraform plan
        env:
          AWS_REGION: us-east-1
        run: |
          docker run --rm \
            -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY -e AWS_SESSION_TOKEN -e AWS_REGION \
            -v "${{ github.workspace }}/infra/terraform:/tf" \
            -w /tf/environments/${{ matrix.environment }} \
            hashicorp/terraform:1.5 plan -input=false -no-color \
            | tee plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}-${{ github.sha }}
          path: infra/terraform/environments/${{ matrix.environment }}/plan.txt

      - name: Record plan commit
        run: echo "Terraform plan for commit ${{ github.sha }} (${{ matrix.environment }})"
