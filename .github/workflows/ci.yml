name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit test with coverage
        run: npm run test:cov -- --coverageThreshold='{"global":{"lines":80,"statements":80}}'

      - name: Authorization red-team gate
        run: npm run test:red-team
        env:
          AUTH_BYPASS: 'true'
          CEDAR_BYPASS: 'false'

      - name: Upload red-team JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: red-team-junit
          path: backend/test-results/red-team-junit.xml

      - name: Build
        run: npm run build

      - name: Snyk dependency scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=package.json

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Docker build (no push)
        working-directory: ..
        run: docker build -t api:ci-${{ github.sha }} .
